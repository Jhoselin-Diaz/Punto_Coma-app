<main class="admin-auth">
  <div class="shape shape-left"></div>
  <div class="shape shape-right"></div>
  <div class="dots dots-top" aria-hidden="true"></div>
  <div class="dots dots-bottom" aria-hidden="true"></div>
  <div class="plant" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <section class="auth-card" aria-label="Inicio de sesion de administrador">
    <div class="admin-icon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2.6 4.5 6.2v11.6l7.5 3.6 7.5-3.6V6.2L12 2.6Zm0 1.66 5.56 2.66L12 9.58 6.44 6.92 12 4.26Zm-6 4 5.25 2.51v8.55L6 16.8V8.26Zm6.75 11.06v-8.55L18 8.26v8.54l-5.25 2.52Z" />
      </svg>
    </div>
    <h1>Admin</h1>
    <p class="intro">Inicia sesion para continuar</p>

    <form class="auth-form">
      <label>
        Correo electronico
        <span class="field">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4.75 6.5h14.5c.96 0 1.75.79 1.75 1.75v7.5c0 .96-.79 1.75-1.75 1.75H4.75A1.75 1.75 0 0 1 3 15.75v-7.5c0-.96.79-1.75 1.75-1.75Zm.18 1.5 7.07 4.8L19.07 8H4.93Zm14.57 1.38-7.08 4.8a.75.75 0 0 1-.84 0L4.5 9.38v6.37c0 .14.11.25.25.25h14.5c.14 0 .25-.11.25-.25V9.38Z" />
          </svg>
          <input type="email" placeholder="ejemplo@correo.com" />
        </span>
      </label>

      <label>
        Contrasena
        <span class="field">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.5 10V8a4.5 4.5 0 1 1 9 0v2h.75c.96 0 1.75.79 1.75 1.75v6.5c0 .96-.79 1.75-1.75 1.75H6.75A1.75 1.75 0 0 1 5 18.25v-6.5c0-.96.79-1.75 1.75-1.75h.75Zm1.5 0h6V8a3 3 0 0 0-6 0v2Zm-2.25 1.5a.25.25 0 0 0-.25.25v6.5c0 .14.11.25.25.25h10.5c.14 0 .25-.11.25-.25v-6.5a.25.25 0 0 0-.25-.25H6.75Z" />
          </svg>
          <input type="password" placeholder="••••••••••" />
          <span class="eye">◌</span>
        </span>
      </label>

      <div class="options">
        <label class="remember"><input type="checkbox" /> Recordarme</label>
        <a href="#">¿Olvidaste tu contrasena?</a>
      </div>

      <button class="primary" type="button">Iniciar sesion</button>
    </form>

    <div class="separator"><span></span><small>o continua con</small><span></span></div>
    <button class="google" type="button"><strong>G</strong> Continuar con Google</button>
    <div class="switch">¿No tienes cuenta? <a routerLink="/admin/crear-cuenta">Registrate</a></div>
  </section>
</main>
